services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: subtrack
      POSTGRES_PASSWORD: subtrack
      POSTGRES_DB: subtrack
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U subtrack -d subtrack"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      # Внутри compose-сети хост БД — имя сервиса postgres.
      DATABASE_URL: "postgresql://subtrack:subtrack@postgres:5432/subtrack?schema=public"
      AUTH_SECRET: "${AUTH_SECRET:-change-me-openssl-rand-base64-32}"
      AUTH_GOOGLE_ID: "${AUTH_GOOGLE_ID:-}"
      AUTH_GOOGLE_SECRET: "${AUTH_GOOGLE_SECRET:-}"
      NEXTAUTH_URL: "${NEXTAUTH_URL:-http://localhost:3000}"
      ADMIN_EMAILS: "${ADMIN_EMAILS:-admin@example.com}"
      APP_TZ: "${APP_TZ:-Europe/Kyiv}"
      BASE_CURRENCY: "${BASE_CURRENCY:-USD}"
      NODE_ENV: "production"
    ports:
      - "3000:3000"

volumes:
  pgdata:
